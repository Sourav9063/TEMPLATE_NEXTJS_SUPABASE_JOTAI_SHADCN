name: Keep Supabase active

on:
  schedule:
    - cron: "0 3,15 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      PGSSLMODE: require

    steps:
      - name: Check Supabase database
        run: psql "$DATABASE_URL" --command "SELECT 1;"
